<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥤 Telefone de Copo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0f0f1a; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 100%; background: #1a1a2e; border-radius: 32px; padding: 20px; }
        h1 { text-align: center; color: #00b894; margin-bottom: 8px; }
        .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; }
        .status { background: #0f0f1a; padding: 12px; border-radius: 24px; text-align: center; color: #888; margin-bottom: 16px; font-weight: bold; }
        .status.ok { background: #00b89420; color: #00b894; }
        .msgs { background: #0f0f1a; border-radius: 20px; height: 280px; overflow-y: auto; padding: 12px; margin-bottom: 16px; }
        .msg { margin-bottom: 8px; display: flex; }
        .msg.env { justify-content: flex-end; }
        .msg.rec { justify-content: flex-start; }
        .msg .balao { padding: 8px 12px; border-radius: 18px; background: #2d2d44; color: white; max-width: 75%; }
        .msg.env .balao { background: #00b894; }
        .input-area { display: flex; gap: 8px; margin-top: 16px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 28px; background: #0f0f1a; color: white; border: none; }
        .input-area button { padding: 12px 20px; border-radius: 28px; background: #00b894; color: white; border: none; font-weight: bold; }
        .btn { padding: 14px; border-radius: 28px; font-weight: bold; border: none; width: 100%; margin-bottom: 12px; }
        .btn-criar { background: #00b894; color: white; }
        .btn-conectar { background: transparent; border: 2px solid #00b894; color: #00b894; }
        .hidden { display: none; }
        .codigo-sala {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 16px;
        }
        .sala-numero {
            font-size: 32px;
            letter-spacing: 4px;
            font-weight: bold;
            color: #00b894;
            margin: 12px 0;
        }
        .footer { text-align: center; font-size: 10px; color: #444; margin-top: 16px; }
        input.codigo-input {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            background: #0f0f1a;
            color: white;
            border: none;
            text-align: center;
            font-size: 18px;
            letter-spacing: 2px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🥤 Telefone de Copo</h1>
    <div class="sub">Código de 6 letras · Sem servidor</div>

    <div class="status" id="status">⚪ Desconectado</div>

    <div class="msgs" id="msgs">
        <div style="text-align:center;color:#555;padding:40px;">Clique em "Criar Sala"</div>
    </div>

    <div id="telaInicial">
        <button class="btn btn-criar" id="criarSalaBtn">🏠 Criar Sala</button>
        <div style="margin: 16px 0; text-align: center; color: #666;">ou</div>
        <input type="text" id="codigoEntrada" class="codigo-input" placeholder="Digite o código de 6 letras" maxlength="6">
        <button class="btn btn-conectar" id="entrarSalaBtn" style="margin-top: 12px;">🔑 Entrar na Sala</button>
    </div>

    <div id="telaSala" class="hidden">
        <div class="codigo-sala">
            <strong>📋 Código da Sala</strong>
            <div id="salaCodigo" class="sala-numero"></div>
            <button id="copiarCodigoBtn" class="btn-criar" style="padding: 8px; width: auto; margin-top: 8px;">📋 Copiar</button>
        </div>
        <div id="aguardandoMsg" style="text-align: center; color: #f39c12; margin-top: 16px;">
            ⏳ Aguardando alguém entrar...
        </div>
    </div>

    <div class="input-area hidden" id="inputArea">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
        <button id="sendBtn">📤</button>
    </div>

    <div class="footer">🔒 Conexão direta | Código curto | Sem servidor de dados</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// Telefone de Copo - Com código curto de 6 letras

let peer = null;
let conn = null;
let salaId = null;
let conectado = false;

const statusDiv = document.getElementById('status');
const msgsDiv = document.getElementById('msgs');
const inputArea = document.getElementById('inputArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const telaInicial = document.getElementById('telaInicial');
const telaSala = document.getElementById('telaSala');
const salaCodigoDiv = document.getElementById('salaCodigo');
const copiarCodigoBtn = document.getElementById('copiarCodigoBtn');
const aguardandoMsg = document.getElementById('aguardandoMsg');
const criarSalaBtn = document.getElementById('criarSalaBtn');
const entrarSalaBtn = document.getElementById('entrarSalaBtn');
const codigoEntrada = document.getElementById('codigoEntrada');

function addMsg(texto, tipo) {
    const p = msgsDiv.querySelector('div[style*="text-align: center"]');
    if (p) p.remove();
    const div = document.createElement('div');
    div.className = `msg ${tipo === 'env' ? 'env' : 'rec'}`;
    const balao = document.createElement('div');
    balao.className = 'balao';
    balao.textContent = texto;
    div.appendChild(balao);
    msgsDiv.appendChild(div);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

function setStatus(texto, ok = false) {
    statusDiv.textContent = texto;
    statusDiv.className = 'status';
    if (ok) statusDiv.classList.add('ok');
}

function resetar() {
    if (conn) conn.close();
    if (peer) peer.destroy();
    peer = null;
    conn = null;
    conectado = false;
    salaId = null;
    setStatus('⚪ Desconectado');
    inputArea.classList.add('hidden');
    telaInicial.classList.remove('hidden');
    telaSala.classList.add('hidden');
    msgsDiv.innerHTML = '<div style="text-align:center;color:#555;padding:40px;">Clique em "Criar Sala"</div>';
}

function setupConnection() {
    conn.on('open', () => {
        conectado = true;
        setStatus('🔗 CONECTADO!', true);
        inputArea.classList.remove('hidden');
        telaSala.classList.add('hidden');
        telaInicial.classList.add('hidden');
        msgInput.focus();
        addMsg('🔗 Conexão estabelecida!', 'rec');
    });
    conn.on('data', (data) => addMsg(data, 'rec'));
    conn.on('close', () => {
        if (conectado) addMsg('🔌 Conexão encerrada', 'rec');
        resetar();
    });
}

function criarSala() {
    resetar();
    setStatus('🔄 Criando sala...');
    
    peer = new Peer();
    peer.on('open', (id) => {
        salaId = id.substring(0, 6);
        salaCodigoDiv.textContent = salaId;
        telaInicial.classList.add('hidden');
        telaSala.classList.remove('hidden');
        setStatus('📱 Aguardando alguém entrar');
        
        peer.on('connection', (connection) => {
            conn = connection;
            aguardandoMsg.innerHTML = '✅ Alguém entrou! Conectando...';
            setupConnection();
        });
    });
    peer.on('error', (err) => {
        console.error(err);
        setStatus('❌ Erro ao criar sala');
        setTimeout(resetar, 2000);
    });
}

function entrarSala() {
    const codigo = codigoEntrada.value.trim().toUpperCase();
    if (!codigo || codigo.length < 4) {
        alert('Digite o código de 6 letras');
        return;
    }
    
    resetar();
    setStatus('🔄 Entrando na sala...');
    
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(codigo);
        setupConnection();
        telaInicial.classList.add('hidden');
        telaSala.classList.remove('hidden');
        aguardandoMsg.innerHTML = '⏳ Conectando à sala...';
    });
    peer.on('error', (err) => {
        console.error(err);
        setStatus('❌ Sala não encontrada');
        setTimeout(resetar, 2000);
    });
}

function enviar() {
    if (!conn || !conectado) {
        addMsg('⚠️ Sem conexão', 'rec');
        return;
    }
    const texto = msgInput.value.trim();
    if (!texto) return;
    conn.send(texto);
    addMsg(texto, 'env');
    msgInput.value = '';
}

criarSalaBtn.onclick = criarSala;
entrarSalaBtn.onclick = entrarSala;
sendBtn.onclick = enviar;
msgInput.onkeypress = (e) => { if (e.key === 'Enter') enviar(); };
copiarCodigoBtn.onclick = () => {
    navigator.clipboard.writeText(salaCodigoDiv.textContent);
    copiarCodigoBtn.textContent = '✓ Copiado!';
    setTimeout(() => { copiarCodigoBtn.textContent = '📋 Copiar'; }, 2000);
};
</script>
</body>
</html>

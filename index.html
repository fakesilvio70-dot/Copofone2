<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telefone de Copo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0f0f1a; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 100%; background: #1a1a2e; border-radius: 32px; padding: 20px; }
        h1 { text-align: center; color: #00b894; margin-bottom: 8px; }
        .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; }
        .status { background: #0f0f1a; padding: 12px; border-radius: 24px; text-align: center; color: #888; margin-bottom: 16px; }
        .status.ok { background: #00b89420; color: #00b894; }
        .msgs { background: #0f0f1a; border-radius: 20px; height: 300px; overflow-y: auto; padding: 12px; margin-bottom: 16px; }
        .msg { margin-bottom: 8px; display: flex; }
        .msg.env { justify-content: flex-end; }
        .msg.rec { justify-content: flex-start; }
        .msg .balao { padding: 8px 12px; border-radius: 18px; background: #2d2d44; color: white; max-width: 75%; }
        .msg.env .balao { background: #00b894; }
        .input-area { display: flex; gap: 8px; margin-top: 16px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 28px; background: #0f0f1a; color: white; border: none; }
        .input-area button { padding: 12px 20px; border-radius: 28px; background: #00b894; color: white; border: none; font-weight: bold; }
        .botoes { display: flex; gap: 12px; margin-bottom: 16px; }
        .btn { flex: 1; padding: 14px; border-radius: 28px; font-weight: bold; border: none; }
        .btn-criar { background: #00b894; color: white; }
        .btn-conectar { background: transparent; border: 2px solid #00b894; color: #00b894; }
        .hidden { display: none; }
        textarea { width: 100%; padding: 12px; border-radius: 16px; background: #0f0f1a; color: white; border: none; margin: 12px 0; font-size: 10px; }
        .codigo-box { background: #0f0f1a; padding: 12px; border-radius: 16px; margin-top: 16px; }
        .footer { text-align: center; font-size: 10px; color: #444; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🥤 Telefone de Copo</h1>
    <div class="sub">P2P direto | Sem servidor</div>

    <div class="status" id="status">⚪ Desconectado</div>

    <div class="msgs" id="msgs">
        <div style="text-align:center;color:#555;padding:40px;">Clique em "Criar Linha"</div>
    </div>

    <div class="botoes" id="botoes">
        <button class="btn btn-criar" id="criarBtn">🥤 Criar Linha</button>
        <button class="btn btn-conectar" id="conectarBtn">📷 Conectar</button>
    </div>

    <div id="areaCodigo" class="hidden">
        <div class="codigo-box">
            <strong>📋 Envie para seu amigo:</strong>
            <div id="codigoTexto" style="background:#2d2d44; padding:12px; border-radius:12px; margin-top:8px; word-break:break-all; font-size:10px;"></div>
            <button id="btnCopiar" style="margin-top:8px; padding:8px; background:#00b894; color:white; border:none; border-radius:12px;">📋 Copiar</button>
        </div>
    </div>

    <div id="areaResposta" class="hidden">
        <div class="codigo-box">
            <strong>📝 Cole a resposta do seu amigo:</strong>
            <textarea id="respostaInput" rows="3" placeholder="Cole aqui..."></textarea>
            <button id="finalizarBtn" class="btn btn-criar" style="margin-top:8px;">🔗 Conectar</button>
        </div>
    </div>

    <div class="input-area hidden" id="inputArea">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
        <button id="sendBtn">📤</button>
    </div>

    <div class="footer">🔒 Conexão direta | Sem histórico</div>
</div>

<script>
const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
let peer = null, canal = null, conectado = false;

const statusDiv = document.getElementById('status');
const msgsDiv = document.getElementById('msgs');
const inputArea = document.getElementById('inputArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const botoes = document.getElementById('botoes');
const criarBtn = document.getElementById('criarBtn');
const conectarBtn = document.getElementById('conectarBtn');
const areaCodigo = document.getElementById('areaCodigo');
const codigoTexto = document.getElementById('codigoTexto');
const areaResposta = document.getElementById('areaResposta');
const respostaInput = document.getElementById('respostaInput');
const finalizarBtn = document.getElementById('finalizarBtn');
const btnCopiar = document.getElementById('btnCopiar');

function addMsg(texto, tipo) {
    const p = msgsDiv.querySelector('div[style*="text-align: center"]');
    if (p) p.remove();
    const div = document.createElement('div');
    div.className = `msg ${tipo === 'env' ? 'env' : 'rec'}`;
    const balao = document.createElement('div');
    balao.className = 'balao';
    balao.textContent = texto;
    div.appendChild(balao);
    msgsDiv.appendChild(div);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

function setStatus(texto, ok = false) {
    statusDiv.textContent = texto;
    statusDiv.className = 'status';
    if (ok) statusDiv.classList.add('ok');
}

function resetar() {
    if (peer) peer.close();
    if (canal) canal.close();
    peer = null; canal = null; conectado = false;
    setStatus('⚪ Desconectado');
    inputArea.classList.add('hidden');
    areaCodigo.classList.add('hidden');
    areaResposta.classList.add('hidden');
    botoes.classList.remove('hidden');
    msgsDiv.innerHTML = '<div style="text-align:center;color:#555;padding:40px;">Clique em "Criar Linha"</div>';
}

async function criarLinha() {
    resetar();
    setStatus('🔄 Criando linha...');
    try {
        peer = new RTCPeerConnection(config);
        canal = peer.createDataChannel('chat');
        canal.onopen = () => { conectado = true; setStatus('🔗 CONECTADO!', true); inputArea.classList.remove('hidden'); areaCodigo.classList.add('hidden'); areaResposta.classList.add('hidden'); botoes.classList.add('hidden'); msgInput.focus(); };
        canal.onclose = () => { if (conectado) addMsg('🔌 Desconectado', 'rec'); resetar(); };
        canal.onmessage = (e) => addMsg(e.data, 'rec');
        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        await new Promise(r => { if (peer.iceGatheringState === 'complete') r(); else peer.onicegatheringstatechange = () => { if (peer.iceGatheringState === 'complete') r(); }; });
        codigoTexto.textContent = peer.localDescription.sdp;
        setStatus('📱 Envie o código');
        areaCodigo.classList.remove('hidden');
        areaResposta.classList.remove('hidden');
        botoes.classList.add('hidden');
        respostaInput.value = '';
    } catch(err) { setStatus('❌ Erro'); setTimeout(resetar, 2000); }
}

async function finalizar() {
    const resposta = respostaInput.value.trim();
    if (!resposta) return alert('Cole a resposta');
    setStatus('🔄 Conectando...');
    try { await peer.setRemoteDescription({ type: 'answer', sdp: resposta }); }
    catch(err) { setStatus('❌ Falha'); setTimeout(resetar, 2000); }
}

async function conectarCliente(sdpOferta) {
    resetar();
    setStatus('🔄 Conectando...');
    try {
        peer = new RTCPeerConnection(config);
        peer.ondatachannel = (event) => {
            canal = event.channel;
            canal.onopen = () => { conectado = true; setStatus('🔗 CONECTADO!', true); inputArea.classList.remove('hidden'); areaCodigo.classList.add('hidden'); areaResposta.classList.add('hidden'); botoes.classList.add('hidden'); msgInput.focus(); };
            canal.onclose = () => { if (conectado) addMsg('🔌 Desconectado', 'rec'); resetar(); };
            canal.onmessage = (e) => addMsg(e.data, 'rec');
        };
        await peer.setRemoteDescription({ type: 'offer', sdp: sdpOferta });
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        await new Promise(r => { if (peer.iceGatheringState === 'complete') r(); else peer.onicegatheringstatechange = () => { if (peer.iceGatheringState === 'complete') r(); }; });
        areaCodigo.classList.add('hidden');
        areaResposta.classList.remove('hidden');
        document.querySelector('#areaResposta .codigo-box strong').textContent = '📋 Copie e envie para seu amigo';
        respostaInput.value = peer.localDescription.sdp;
        setStatus('📤 Envie a resposta');
        botoes.classList.add('hidden');
    } catch(err) { setStatus('❌ Erro'); setTimeout(resetar, 2000); }
}

function enviar() {
    if (!canal || canal.readyState !== 'open') { addMsg('⚠️ Sem conexão', 'rec'); return; }
    const texto = msgInput.value.trim();
    if (!texto) return;
    canal.send(texto);
    addMsg(texto, 'env');
    msgInput.value = '';
    msgInput.focus();
}

function conectar() {
    const codigo = prompt('Cole o código do seu amigo:');
    if (codigo) conectarCliente(codigo.trim());
}

criarBtn.onclick = criarLinha;
conectarBtn.onclick = conectar;
finalizarBtn.onclick = finalizar;
sendBtn.onclick = enviar;
msgInput.onkeypress = (e) => { if (e.key === 'Enter') enviar(); };
btnCopiar.onclick = () => {
    navigator.clipboard.writeText(codigoTexto.textContent);
    btnCopiar.textContent = '✓ Copiado!';
    setTimeout(() => { btnCopiar.textContent = '📋 Copiar'; }, 2000);
};
</script>
</body>
</html>
